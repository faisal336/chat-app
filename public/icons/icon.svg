<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="ChatApp">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="bubble" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#1e1b4b" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Rounded square background. 102.4 ≈ 20% safe area for maskable. -->
  <rect width="512" height="512" rx="115" fill="url(#bg)"/>

  <!-- Chat bubble -->
  <g filter="url(#shadow)" transform="translate(96 104)">
    <path d="M48 0 H272 a48 48 0 0 1 48 48 v160 a48 48 0 0 1 -48 48 H136 l-64 56 v-56 H48 a48 48 0 0 1 -48 -48 V48 a48 48 0 0 1 48 -48 z"
          fill="url(#bubble)"/>
    <!-- Three dots inside the bubble -->
    <g fill="#3b82f6">
      <circle cx="96"  cy="128" r="20"/>
      <circle cx="160" cy="128" r="20"/>
      <circle cx="224" cy="128" r="20"/>
    </g>
  </g>
</svg>
